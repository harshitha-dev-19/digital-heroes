{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add Golf Score</h2>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100">Save Score</button>
                <a href="/dashboard/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
        <p class="text-muted mt-2">Score must be between 1-45 (Stableford format). Max 5 scores stored.</p>
    </div>
</div>
{% endblock %}
