{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Upload Winner Proof</h2>
        <div class="card p-4">
            <p>Draw: <strong>{{ winner.draw.month|date:"F Y" }}</strong></p>
            <p>Match: <strong>{{ winner.match_type }}-Number Match</strong></p>
            <p>Prize: <strong>£{{ winner.prize_amount }}</strong></p>
            <hr>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Upload Screenshot of Your Scores</label>
                    <input type="file" name="proof_image" 
                           class="form-control" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Submit Proof</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
